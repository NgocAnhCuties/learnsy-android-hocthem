name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest       # ← Đã đổi sang máy ảo GitHub để không bị kẹt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Gradle CLI
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "SUPA_URL=${{ secrets.SUPA_URL }}" >> local.properties
          echo "SUPA_KEY=${{ secrets.SUPA_KEY }}" >> local.properties
          echo "UPSTASH_URL=${{ secrets.UPSTASH_URL }}" >> local.properties
          echo "UPSTASH_TOKEN=${{ secrets.UPSTASH_TOKEN }}" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ----- ĐÃ XÓA BƯỚC SIGN RELEASE WITH DEBUG KEYSTORE Ở ĐÂY -----

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: learnsy-release-apk
          path: app/build/outputs/apk/release/app-release*.apk
